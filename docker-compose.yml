services:
  db:
    image: postgres:18
    container_name: aml-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aml
      POSTGRES_USER: aml
      POSTGRES_PASSWORD: aml
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 5
      start_period: 5s
      timeout: 5s